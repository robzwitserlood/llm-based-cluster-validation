# Student model — Ministral-4b-instruct served locally via SGLang (fine-tuned target)
student:
  provider: lm_studio          # lm_studio = OpenAI-compatible; tells litellm that json_schema is supported
  name: Ministral-4b-instruct
  hf_name: /root/.cache/huggingface/hub/models--ministral--Ministral-4b-instruct/snapshots/f67f8fe8a161de571537aa9e23edb1c50d72e7ef
  base_url: http://localhost:30000/v1   # SGLang OpenAI-compatible endpoint
  api_key: EMPTY                        # SGLang does not require a real key
  temperature: 0.4
  max_tokens: 2000
  repetition_penalty: 1.2

# Teacher model — Claude Sonnet via Anthropic API (generates training traces)
teacher:
  provider: anthropic
  name: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY        # Set this in .env or your environment
  temperature: 0.0
  max_tokens: 4000
