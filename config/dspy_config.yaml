# Student model — used by evaluate.py, optimize.py, optimize_gepa.py, and the notebook.
# Point this at whatever local inference server you are running (lmstudio, SGLang, Ollama …).
# Does NOT need use_local_provider — a plain OpenAI-compatible endpoint is sufficient.
student:
  provider: lm_studio          # lm_studio = OpenAI-compatible; tells litellm that json_schema is supported
  name: Ministral-4b-instruct
  base_url: http://localhost:30000/v1   # SGLang OpenAI-compatible endpoint
  api_key: EMPTY                   # lmstudio accepts any non-empty key
  temperature: 0.4
  max_tokens: 2000
  repetition_penalty: 1.2

# Fine-tune student — used ONLY by pipeline/optimize_finetune.py.
# Must use SGLang via DSPy LocalProvider so that launch/kill/finetune are available.
# Keep this block pointing at the local HuggingFace snapshot regardless of what
# the 'student' block above is set to.
finetune_student:
  provider: openai/local        # LiteLLM prefix for local OpenAI-compatible endpoint
  name: Ministral-4b-instruct   # display name only
  hf_name: /root/.cache/huggingface/hub/models--ministral--Ministral-4b-instruct/snapshots/f67f8fe8a161de571537aa9e23edb1c50d72e7ef
  use_local_provider: true      # attach DSPy LocalProvider for SGLang launch/kill/finetune
  base_url: http://localhost:30000/v1   # SGLang OpenAI-compatible endpoint
  api_key: EMPTY                        # SGLang does not require a real key
  temperature: 0.4
  max_tokens: 2000
  repetition_penalty: 1.2

# Fine-tuned weights output — separate path from the source weights above
finetuned:
  output_dir: ./finetuned_model

# Teacher model — Claude Sonnet via Anthropic API (generates training traces)
teacher:
  provider: anthropic
  name: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY        # Set this in .env or your environment
  temperature: 0.0
  max_tokens: 4000
