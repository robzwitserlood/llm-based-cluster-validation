# Orchestration defaults for the Snakefile.
# Override per run with:  snakemake --config gepa_auto=heavy num_threads=8

# DSPy config path — passed through to every pipeline function
dspy_config: config/dspy_config.yaml

# build_dataset
max_docs: 5000
examples_per_topic: 4
top_n: 10
seed: 42

# shared
num_threads: 4

# optimize (BootstrapFewShot)
max_bootstrapped_demos: 4
max_labeled_demos: 16

# optimize_gepa
gepa_auto: light            # light | medium | heavy
gepa_max_iterations: 3

# optimize_finetune
finetune:
  output_dir: finetuned_model
  epochs: 1
  lr: 5.0e-5
  batch_size: 1
  grad_accum: 16
  bf16: true
  use_peft: true
